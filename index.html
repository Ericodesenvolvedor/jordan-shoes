<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordan Shoes</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/base/global.css" />
    <link rel="stylesheet" href="assets/css/module/container.css" />
    <link rel="stylesheet" href="assets/css/module/shoes-items.css" />
    <link rel="stylesheet" href="assets/css/layout/header.css" />
    <link rel="stylesheet" href="assets/css/layout/main.css" />
</head>
<body>
    <header>
        <h3>JordanShoes</h3>
        <div class="banner">
            <div class="container">
                <div class="banner__content">
                    <h1 class="banner__titulo">A melhor loja de Jordan</h1>
                    <p class="banner__descricao">O tênis Jordan é fruto de uma velha e forte parceria entre a Nike e o jogador Michael Jordan.</p>
                </div>
            </div>
        </div>
    </header>
    <main class="container">
        <section class="shoes">
            <div class="shoes__texto-wrapper">
                <h2 class="shoes__titulo">Destaques</h2>
                <p class="shoes__descricao">Frete grátis e chinelo de brinde é aqui, aproveite por tempo limitado. </p>
            </div>

            <ul class="shoes__items">
                <li class="shoes__item">
                    <img src="./assets/images/air-jordan-1-high-zoom-cmft-tropical-twist-1-400.png" alt="Sapato modelo jordan" class="shoes__item-img">
                </li>

                <li class="shoes__item">
                    <img src="./assets/images/air-jordan-1-mid-black-noble-red.png" alt="Sapato modelo jordan" class="shoes__item-img">
                </li>

                <li class="shoes__item">
                    <img src="./assets/images/air-jordan-1-mid-bright-citrus.png" alt="Sapato modelo jordan" class="shoes__item-img">
                </li>

                <li class="shoes__item">
                    <img src="./assets/images/air-jordan-1-mid-carbon-fiber.png" alt="Sapato modelo jordan" class="shoes__item-img">
                </li>

                <li class="shoes__item">
                    <img src="./assets/images/air-jordan-1-mid-dutch-green.png" alt="Sapato modelo jordan" class="shoes__item-img">
                </li>

                <li class="shoes__item">
                    <img src="./assets/images/air-jordan-1-mid-grey-camo.png" alt="Sapato modelo jordan" class="shoes__item-img">
                </li>

                <li class="shoes__item">
                    <img src="./assets/images/air-jordan-1-retro-high-court-purple.png" alt="Sapato modelo jordan" class="shoes__item-img">
                </li>

                <li class="shoes__item">
                    <img src="./assets/images/air-jordan-1-mid-light-smoke-grey.png" alt="Sapato modelo jordan" class="shoes__item-img">
                </li>
            </ul>
        </section>
    </main>

    <footer>
        Todos os direitos reservados.
    </footer>
</body>
</html>
